services:
  django-server:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - sqlite-db:/app

    develop:
      watch:
        # Sync the working directory with the `/app` directory in the container
        - action: sync
          path: .
          target: /app
          # Exclude the project virtual environment
          ignore:
            - .venv/

        # Rebuild the image on changes to the `pyproject.toml`
        - action: rebuild
          path: ./pyproject.toml

volumes:
  sqlite-db:
